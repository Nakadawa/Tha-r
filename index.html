<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Continent de Thair</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #map-container {
      position: relative;
      width: 70%;
      overflow: auto;
      background: #111;
    }

    #map {
      width: 100%;
      display: block;
    }

    .marker {
      position: absolute;
      transform: translate(-50%, -50%);
      background: #3b1e0f;
      color: #f0d68a;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid #c9a44c;
      font-weight: bold;
      box-shadow: 0 0 8px rgba(0,0,0,0.6);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .marker:hover {
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 0 15px rgba(255, 215, 100, 0.8);
      background: #5a2d14;
    }

    #info {
      width: 30%;
      padding: 25px;
      background: #e2cfa0;
      color: #2b1e12;
      overflow-y: auto;
      box-sizing: border-box;
      font-family: Georgia, serif;
      line-height: 1.7;
      border-left: 8px solid #4a3215;
      background-image: url("https://www.transparenttextures.com/patterns/old-paper.png");
      box-shadow:
        inset 0 0 40px rgba(0,0,0,0.35),
        0 0 20px rgba(0,0,0,0.25);
    }

    #info h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-family: "Cinzel", serif;
      color: #3b2a18;
      font-size: 2rem;
    }

    #info h3 {
      margin-top: 0;
      margin-bottom: 14px;
      color: #6b4b2a;
      font-family: "Cinzel", serif;
      font-size: 1.15rem;
    }

    #info p {
      margin-top: 0;
      margin-bottom: 10px;
    }

    #info img {
      width: 100%;
      margin-top: 16px;
      border-radius: 8px;
      border: 2px solid #7a5a32;
      box-shadow: 0 0 12px rgba(0,0,0,0.35);
    }

    .info-section {
      margin-top: 14px;
      padding-top: 8px;
      border-top: 1px solid rgba(74, 50, 21, 0.25);
    }

    .info-section strong {
      display: inline-block;
      margin-bottom: 4px;
      color: #6b4b2a;
      font-family: "Cinzel", serif;
    }
  </style>
</head>
<body>

<div id="map-container">
  <img id="map">
</div>

<div id="info">
  <h2>Informations</h2>
  <p>Clique sur une ville</p>
</div>

<script>
fetch("thair.json")
  .then(res => res.json())
  .then(data => {
    const country = data.countries[0];
    const map = document.getElementById("map");
    const container = document.getElementById("map-container");

    map.src = country.map;

    map.onload = () => {
      country.cities.forEach(city => {
        const marker = document.createElement("div");
        marker.className = "marker";

        let icon = "📍";

        if (["karan", "ekine", "fortma", "okren"].includes(city.id)) {
          icon = "👑";
        } else if (["lemenia", "sadia", "al-deora"].includes(city.id)) {
          icon = "🌿";
        } else if (["bavix", "var-lorhdir"].includes(city.id)) {
          icon = "⚒️";
        } else if (["firmak", "beletor"].includes(city.id)) {
          icon = "⚔️";
        } else if (["pont", "port-sybur", "sombres-landes"].includes(city.id)) {
          icon = "🏰";
        }

        marker.innerHTML = `${icon} ${city.name}`;
        marker.style.left = city.position.x + "%";
        marker.style.top = city.position.y + "%";

        marker.onclick = () => {
          document.getElementById("info").innerHTML = `
            <h2>${city.name}</h2>
            ${city.title ? `<h3>${city.title}</h3>` : ""}
            ${city.description ? `<p>${city.description}</p>` : ""}

            ${city.districts?.south ? `
              <div class="info-section">
                <strong>Zone sud :</strong>
                <p>${city.districts.south}</p>
              </div>
            ` : ""}

            ${city.districts?.north ? `
              <div class="info-section">
                <strong>Zone nord :</strong>
                <p>${city.districts.north}</p>
              </div>
            ` : ""}

            ${city.history ? `
              <div class="info-section">
                <strong>Histoire :</strong>
                <p>${city.history}</p>
              </div>
            ` : ""}

            ${city.economy ? `
              <div class="info-section">
                <strong>Économie :</strong>
                <p>${city.economy}</p>
              </div>
            ` : ""}

            ${city.society ? `
              <div class="info-section">
                <strong>Société :</strong>
                <p>${city.society}</p>
              </div>
            ` : ""}

            ${city.reputation ? `
              <div class="info-section">
                <strong>Réputation :</strong>
                <p>${city.reputation}</p>
              </div>
            ` : ""}

            ${city.education ? `
              <div class="info-section">
                <strong>Université :</strong>
                <p>${city.education}</p>
              </div>
            ` : ""}

            ${city.military ? `
              <div class="info-section">
                <strong>Forces armées :</strong>
                <p>${city.military}</p>
              </div>
            ` : ""}

            ${city.mystery ? `
              <div class="info-section">
                <strong>Mystère :</strong>
                <p>${city.mystery}</p>
              </div>
            ` : ""}

            ${city.law ? `
              <div class="info-section">
                <strong>Interdits :</strong>
                <p>${city.law}</p>
              </div>
            ` : ""}

            ${city.politics ? `
              <div class="info-section">
                <strong>Pouvoir :</strong>
                <p>${city.politics}</p>
              </div>
            ` : ""}

            ${city.daily_life ? `
              <div class="info-section">
                <strong>Vie quotidienne :</strong>
                <p>${city.daily_life}</p>
              </div>
            ` : ""}

            ${city.landmark ? `
              <div class="info-section">
                <strong>Particularité :</strong>
                <p>${city.landmark}</p>
              </div>
            ` : ""}

            ${city.culture ? `
              <div class="info-section">
                <strong>Culture :</strong>
                <p>${city.culture}</p>
              </div>
            ` : ""}

            ${city.entertainment ? `
              <div class="info-section">
                <strong>Divertissement :</strong>
                <p>${city.entertainment}</p>
              </div>
            ` : ""}

            ${city.religion ? `
              <div class="info-section">
                <strong>Religion :</strong>
                <p>${city.religion}</p>
              </div>
            ` : ""}

            ${city.map ? `<img src="${city.map}" alt="Carte de ${city.name}">` : ""}
          `;
        };

        container.appendChild(marker);
      });
    };
  });
</script>

</body>
</html>
